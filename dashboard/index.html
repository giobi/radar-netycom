<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar — Netycom</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fafaf9; --surface: #ffffff;
    --border: #e5e5e0; --border-strong: #d0d0c8;
    --green: #15803d; --yellow: #854d0e; --red: #b91c1c;
    --text: #1c1917; --text-secondary: #57534e; --text-muted: #a8a29e;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', 'Consolas', monospace;
    --radius: 3px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); line-height:1.65; font-size:14px; }
header { background: var(--surface); border-bottom: 2px solid var(--text); padding: 2.5rem 0 2rem; }
.container { max-width: 860px; margin:0 auto; padding:0 2rem; }
.brand { font-size: .65rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .75rem; display: flex; align-items: center; gap: .5rem; }
.brand svg { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.01em; }
.subtitle { font-size: .78rem; color: var(--text-muted); margin-top: .25rem; }
.stats { display: flex; gap: 2rem; margin-top: 1rem; font-size: .7rem; color: var(--text-muted); }
main { padding: 2rem 0 4rem; }
.project { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); }
.project:first-child { border-top: 1px solid var(--border); }
.project:hover { background: rgba(0,0,0,.015); }
.project-name { font-weight: 600; font-size: .85rem; }
.project-url { font-size: .7rem; color: var(--text-muted); margin-top: .1rem; }
.project-meta { text-align: right; }
.project-runs { font-size: .68rem; color: var(--text-muted); margin-top: .15rem; }
.verdict { font-size: .62rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
.v-green { color: var(--green); }
.v-yellow { color: var(--yellow); }
.v-red { color: var(--red); }
.watermark { position: fixed; bottom: 1rem; right: 1.5rem; font-size: .62rem; color: var(--text-muted); letter-spacing: .04em; }
.watermark a { color: var(--text-muted); text-decoration: none; }
.watermark a:hover { color: var(--text-secondary); }
</style>
</head>
<body>
<header>
<div class="container">
    <div class="brand"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="2" x2="12" y2="4"/></svg>Radar</div>
    <h1>Dashboard</h1>
    <p class="subtitle">Progetti monitorati e report di collaudo</p>
    <div class="stats">
        <span>3 progetti</span>
        <span>14 report</span>
        <span>ultimo: 2026-03-19</span>
    </div>
</div>
</header>
<main>
<div class="container">
    <a class="project" href="../netycom/">
        <div>
            <div class="project-name">Netycom</div>
            <div class="project-url">netycom.it</div>
        </div>
        <div class="project-meta">
            <div class="verdict v-red">issues</div>
            <div class="project-runs">1 report</div>
        </div>
    </a>
    <a class="project" href="../nexum/">
        <div>
            <div class="project-name">Nexum</div>
            <div class="project-url">nexum.it</div>
        </div>
        <div class="project-meta">
            <div class="verdict v-green">healthy</div>
            <div class="project-runs">11 report</div>
        </div>
    </a>
    <a class="project" href="../in-energy/">
        <div>
            <div class="project-name">In Energy Promo</div>
            <div class="project-url">promo.in-energy.it</div>
        </div>
        <div class="project-meta">
            <div class="verdict v-yellow">70 — issues</div>
            <div class="project-runs">3 report · ultimo: 2026-03-19</div>
        </div>
    </a>
</div>
</main>
<div class="watermark"><a href="https://netycom.it">netycom.it</a></div>
</body>
</html>
