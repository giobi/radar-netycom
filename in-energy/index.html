<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar — In Energy Promo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fafaf9; --surface: #ffffff;
    --border: #e5e5e0; --text: #1c1917; --text-secondary: #57534e; --text-muted: #a8a29e;
    --green: #15803d; --yellow: #854d0e; --red: #b91c1c;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', 'Consolas', monospace;
    --radius: 3px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); line-height:1.65; font-size:14px; }
header { background: var(--surface); border-bottom: 2px solid var(--text); padding: 2.5rem 0 2rem; }
.container { max-width: 860px; margin:0 auto; padding:0 2rem; }
.brand { font-size: .65rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .75rem; display: flex; align-items: center; gap: .5rem; }
.brand svg { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
.brand a { color: var(--text-muted); text-decoration: none; }
h1 { font-size: 1.3rem; font-weight: 700; }
.subtitle { font-size: .78rem; color: var(--text-muted); margin-top: .25rem; }
main { padding: 2rem 0 4rem; }
.report { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); }
.report:first-child { border-top: 1px solid var(--border); }
.report:hover { background: rgba(0,0,0,.015); }
.report-title { font-weight: 600; font-size: .85rem; }
.report-date { font-size: .7rem; color: var(--text-muted); margin-top: .1rem; }
.report-meta { text-align: right; }
.verdict { font-size: .62rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
.v-green { color: var(--green); }
.v-yellow { color: var(--yellow); }
.v-red { color: var(--red); }
.watermark { position: fixed; bottom: 1rem; right: 1.5rem; font-size: .62rem; color: var(--text-muted); }
.watermark a { color: var(--text-muted); text-decoration: none; }
</style>
</head>
<body>
<header>
<div class="container">
    <div class="brand"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="2" x2="12" y2="4"/></svg><a href="../dashboard/">Radar</a></div>
    <h1>In Energy Promo</h1>
    <p class="subtitle">promo.in-energy.it — Report di collaudo</p>
</div>
</header>
<main>
<div class="container">
    <a class="report" href="2026-03-19-mobile-layout-issues/">
        <div>
            <div class="report-title">Problemi layout mobile — pagina Gruppo Altair</div>
            <div class="report-date">19 marzo 2026 · Verifica + Correzione</div>
        </div>
        <div class="report-meta">
            <div class="verdict v-green">90/100</div>
        </div>
    </a>
    <a class="report" href="2026-03-18-mobile-check/">
        <div>
            <div class="report-title">Verifica e miglioramento versione mobile</div>
            <div class="report-date">18 marzo 2026 · Post-deploy check</div>
        </div>
        <div class="report-meta">
            <div class="verdict v-yellow">75/100</div>
        </div>
    </a>
</div>
</main>
<div class="watermark"><a href="https://radar.netycom.it/dashboard/">radar.netycom.it</a></div>
</body>
</html>
